name: Deploy to Cloudflare Pages

# Self-hosted Forgejo runner — see scripts/runner/
# Uses ubuntu-latest (node:22-bookworm) so actions/checkout has Node available.

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-bookworm-v1
          restore-keys: apt-bookworm-

      - name: Cache Crystal
        id: crystal-cache
        uses: actions/cache@v4
        with:
          path: |
            /usr/bin/crystal
            /usr/share/crystal
            /etc/apt/sources.list.d/crystal.list
          key: crystal-bookworm-v1

      - name: Cache shards
        uses: actions/cache@v4
        with:
          path: lib
          key: shards-${{ hashFiles('shard.lock') }}
          restore-keys: shards-

      - name: Cache Capsule binary
        uses: actions/cache@v4
        with:
          path: bin
          key: bin-${{ hashFiles('shard.lock', 'shard.yml', 'src/**/*.cr') }}
          restore-keys: bin-

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: /root/.npm
          key: npm-wrangler-v1
          restore-keys: npm-wrangler-

      - name: Install Crystal
        if: steps.crystal-cache.outputs.cache-hit != 'true'
        run: |
          apt-get update
          apt-get install -y curl git ca-certificates
          curl -fsSL https://crystal-lang.org/install.sh | bash
          crystal --version

      - name: Verify Crystal
        if: steps.crystal-cache.outputs.cache-hit == 'true'
        run: crystal --version

      - name: Build site
        run: |
          shards install
          if [[ ! -x bin/capsule ]]; then
            shards build --release
          fi
          ./bin/capsule build

      - name: Ensure Pages project exists
        run: npx wrangler@4 pages project create website --production-branch=main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@4 pages deploy public --project-name=website --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
