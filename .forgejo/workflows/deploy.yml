name: Deploy to Cloudflare Pages

# Self-hosted Forgejo runner — see scripts/runner/
# Uses ubuntu-latest (node:22-bookworm) so actions/checkout has Node available.

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Crystal
        run: |
          apt-get update
          apt-get install -y curl git ca-certificates
          curl -fsSL https://crystal-lang.org/install.sh | bash
          crystal --version

      - name: Build site
        run: |
          shards install
          shards build --release
          ./bin/capsule build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@4 pages deploy public --project-name=website --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
