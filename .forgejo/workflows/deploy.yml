name: Deploy to Cloudflare Pages

# Requires a self-hosted Forgejo runner in Docker — see scripts/runner/
#   make runner-init && make runner-up
#
# Codeberg shared runners (codeberg-small) are unreliable — actions/meta#76

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: crystal
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps
        run: apk add --no-cache git nodejs npm

      - name: Build site
        run: |
          shards install
          shards build --release
          ./bin/capsule build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@4 pages deploy public --project-name=website --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
