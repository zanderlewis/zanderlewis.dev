name: Deploy to Cloudflare Pages

# Runs on YOUR machine via a self-hosted Forgejo runner.
# Codeberg's shared runners (codeberg-small) are often stuck — see actions/meta#76.
#
# Setup once: repo Settings → Actions → Runners → Create new runner
# Then: forgejo-runner register && forgejo-runner daemon

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site
        run: |
          shards install
          shards build --release
          ./bin/capsule build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@4 pages deploy public --project-name=website --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
