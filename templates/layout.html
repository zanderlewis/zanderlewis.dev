<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{description}}">
  <title>{{title}} · {{site_title}}</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="site-brand">{{site_title}}</a>
      <nav class="site-nav">
        {{nav}}
      </nav>
    </div>
  </header>

  <main class="container content">
    {{content}}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-meta">
        <p class="footer-name">{{author}}</p>
        <p class="footer-tagline">{{tagline}}</p>
      </div>
      <div class="social-links">
        <a href="{{github}}" class="social-link">GitHub</a>
        <a href="{{codeberg}}" class="social-link">Codeberg</a>
        <a href="{{website}}" class="social-link">Website</a>
      </div>
      <p class="footer-copy">&copy; {{author}} · {{location}}</p>
    </div>
  </footer>
</body>
</html>
